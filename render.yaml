databases:
  - name: recipes-db
    databaseName: recipes_db
    user: recipes_user
    plan: free

services:
  - type: web
    name: recipes-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: recipes-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://recipes-frontend.onrender.com  # update after frontend deploy

  - type: web
    name: recipes-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://recipes-backend.onrender.com  # update with actual backend URL
